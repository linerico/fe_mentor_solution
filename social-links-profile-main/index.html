<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="min-h-screen grid place-items-center bg-neutral-900 px-6">
      <section
        class="w-full max-w-sm rounded-2xl bg-neutral-800 p-6 text-center"
      >
        <img
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall"
          class="mx-auto mb-6 h-20 w-20 rounded-full"
        />

        <h1 class="text-2xl font-bold text-white">Jessica Randall</h1>
        <p class="mt-2 text-sm font-semibold text-lime-400">
          London, United Kingdom
        </p>
        <p class="mt-6 text-sm text-neutral-300">
          "Front-end developer and avid reader."
        </p>

        <nav aria-label="Social links" class="mt-6">
          <ul class="space-y-4">
            <li>
              <a
                href="#"
                class="block rounded-lg bg-neutral-700 px-4 py-3 font-semibold text-white"
                >GitHub</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block rounded-lg bg-neutral-700 px-4 py-3 font-semibold text-white"
                >Frontend Mentor</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block rounded-lg bg-neutral-700 px-4 py-3 font-semibold text-white"
                >LinkedIn</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block rounded-lg bg-neutral-700 px-4 py-3 font-semibold text-white"
                >Twitter</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block rounded-lg bg-neutral-700 px-4 py-3 font-semibold text-white"
                >Instagram</a
              >
            </li>
          </ul>
        </nav>
      </section>
    </main>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/linerico">Erico</a>.
    </div>
  </body>
</html>
